# ============================================================
# 定时价格爬虫 · 每天早上自动更新
# 使用 Playwright 爬取京东/淘宝/亚马逊真实价格
#
# 所需 Secrets（在仓库 Settings → Secrets → Actions 中配置）:
# GITHUB_TOKEN — 自动提供
# SCRAPER_SECRET — 与 api/prices.js 保持一致的密钥
# ============================================================

name: 💰 电脑配件价格爬虫

on:
  schedule:
    # 每30分钟运行一次
    - cron: "*/30 * * * *"

  # 支持手动触发
  workflow_dispatch:
    inputs:
      categories:
        description: "指定分类 (留空=全部): cpu gpu ram ssd mb cool"
        required: false
        default: ""

# 防止并发冲突
concurrency:
  group: price-scraper
  cancel-in-progress: false

jobs:
  scrape:
    name: 🕷️ 抓取最新价格
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      # ── 1. 检出代码 ──────────────────────────────────────
      - name: ⬇️ Checkout
        uses: actions/checkout@v4

      # ── 2. 配置 Python ───────────────────────────────────
      - name: 🐍 Setup Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: 'pip'

      # ── 3. 安装 Playwright ──────────────────────────────
      - name: 🧪 Install Playwright
        run: |
          pip install playwright
          playwright install chromium
          playwright install-deps

      # ── 4. 安装其他依赖 ─────────────────────────────────
      - name: 📦 Install dependencies
        run: |
          pip install requests beautifulsoup4 lxml

      # ── 5. 运行 Playwright 爬虫 ──────────────────────────
      - name: 🚀 Run Playwright scraper
        env:
          SCRAPER_SECRET: ${{ secrets.SCRAPER_SECRET }}
        run: |
          python scripts/playwright_scraper.py

      # ── 6. 提交价格历史到仓库 ────────────────────────────
      - name: 💾 Commit price history
        run: |
          git config --local user.email "price-bot@github-actions"
          git config --local user.name "Price Bot 🤖"
          git add data/price-history.json
          if git diff --staged --quiet; then
            echo "✅ 价格无变化，跳过提交"
          else
            TIMESTAMP=$(date -u "+%Y-%m-%d %H:%M UTC")
            git commit -m "💰 价格更新: $TIMESTAMP"
            git push
            echo "✅ price-history.json 已提交"
          fi

  # ── 通知（可选）────────────────────────────────────
  notify:
    name: 🔔 通知
    runs-on: ubuntu-latest
    needs: scrape
    if: failure()

    steps:
      - name: 发送失败通知
        uses: actions/github-script@v7
        with:
          script: |
            await github.rest.issues.create({
              owner: context.repo.owner,
              repo: context.repo.repo,
              title: `🚨 价格爬虫失败 #${context.runNumber}`,
              body: [
                '## 爬虫任务失败',
                '',
                `- **时间**: ${new Date().toISOString()}`,
                `- **运行 ID**: [${context.runId}](${context.serverUrl}/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId})`,
                '',
                '请检查 Actions 日志排查问题。',
              ].join('\n'),
              labels: ['bug', 'price-scraper'],
            });
