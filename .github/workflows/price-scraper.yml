# ============================================================
# 定时价格爬虫 · 每10分钟抓取一次电脑配件价格
#
# 所需 Secrets（在仓库 Settings → Secrets → Actions 中配置）:
# SCRAPER_SECRET — 与 api/prices.js 保持一致的密钥
# API_BASE_URL — 如 https://your-site.vercel.app
# VERCEL_TOKEN — （可选）用于触发 Vercel 重新部署
# ============================================================

name: 💰 电脑配件价格爬虫

on:
  schedule:
    # UTC 时间每10分钟执行一次
    # GitHub Actions 最高频率为每5分钟，此处设为10分钟
    - cron: "*/10 * * * *"

  # 支持手动触发（方便调试）
  workflow_dispatch:
    inputs:
      categories:
        description: "指定分类 (留空=全部): cpu gpu ram ssd mb cool"
        required: false
        default: ""
      dry_run:
        description: "只保存本地，不推送 API"
        type: boolean
        default: false

# 防止并发冲突：同一时间只允许运行一个爬虫任务
concurrency:
  group: price-scraper
  cancel-in-progress: false

jobs:
  scrape:
    name: 🕷️ 抓取最新价格
    runs-on: ubuntu-latest
    timeout-minutes: 8 # 单次最长8分钟，留2分钟余量

    steps:
      # ── 1. 检出代码 ──────────────────────────────────────
      - name: ⬇️ Checkout
        uses: actions/checkout@v4
        with:
          # 需要写权限，用于提交 price-history.json
          token: ${{ secrets.GITHUB_TOKEN }}

      # ── 2. 配置 Python ───────────────────────────────────
      - name: 🐍 Setup Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      # ── 3. 安装依赖 ──────────────────────────────────────
      - name: 📦 Install dependencies
        run: |
          pip install --upgrade pip
          pip install requests beautifulsoup4 lxml

      # ── 4. 运行爬虫 ──────────────────────────────────────
      - name: 🚀 Run price scraper
        env:
          SCRAPER_SECRET: ${{ secrets.SCRAPER_SECRET }}
          API_BASE_URL: ${{ secrets.API_BASE_URL }}
        run: |
          CATEGORIES="${{ github.event.inputs.categories }}"
          DRY_RUN="${{ github.event.inputs.dry_run }}"

          CMD="python scripts/real-price-scraper.py"
          if [ -n "$CATEGORIES" ]; then
            CMD="$CMD --categories $CATEGORIES"
          fi
          if [ "$DRY_RUN" = "true" ]; then
            CMD="$CMD --no-push"
          fi

          echo "执行命令: $CMD"
          $CMD

      # ── 5. 提交价格历史到仓库 ────────────────────────────
      - name: 💾 Commit price history
        run: |
          git config --local user.email "price-bot@github-actions"
          git config --local user.name "Price Bot 🤖"
          git add data/price-history.json
          # 仅当文件有变化时才提交
          if git diff --staged --quiet; then
            echo "✅ 价格无变化，跳过提交"
          else
            TIMESTAMP=$(date -u "+%Y-%m-%d %H:%M UTC")
            git commit -m "💰 价格更新: $TIMESTAMP [skip ci]"
            git push
            echo "✅ price-history.json 已提交"
          fi

      # ── 6. 上传日志（失败时方便调试）────────────────────
      - name: 📋 Upload logs on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: scraper-error-log-${{ github.run_number }}
          path: |
            *.log
            data/
          retention-days: 7

  # ── 价格异常通知（可选）────────────────────────────────────
  notify:
    name: 🔔 价格异常通知
    runs-on: ubuntu-latest
    needs: scrape
    if: failure()

    steps:
      - name: 发送失败通知
        uses: actions/github-script@v7
        with:
          script: |
            await github.rest.issues.create({
              owner: context.repo.owner,
              repo: context.repo.repo,
              title: `🚨 价格爬虫失败 #${context.runNumber}`,
              body: [
                '## 爬虫任务失败',
                '',
                `- **时间**: ${new Date().toISOString()}`,
                `- **运行 ID**: [${context.runId}](${context.serverUrl}/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId})`,
                '',
                '请检查 Actions 日志排查问题。',
              ].join('\n'),
              labels: ['bug', 'price-scraper'],
            });
