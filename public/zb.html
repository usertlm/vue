<!DOCTYPE html>
<html lang="en">
<head>
    <script async src="https://pagead2.googlesyndication.com/pagead/js/adsbygoogle.js?client=ca-pub-2813195378092882"
     crossorigin="anonymous"></script>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>直播页面</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            background: #f0f0f0;
            margin: 0;
            padding: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
        }
        #video-container {
            margin: 20px;
            width: 500px;
            height: 300px;
            background-color: #000;
        }
        #chat-container {
            width: 300px;
            background: #fff;
            border: 1px solid #ccc;
            padding: 10px;
            margin-top: 10px;
        }
        video {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }
    </style>
</head>
<body>
    <h1>欢迎来到直播页面</h1>
    <div id="video-container">
        <video id="live-video" controls autoplay></video>
    </div>
    <div id="chat-container">
        <h2>聊天</h2>
        <div id="chat-window" style="height: 200px; border: 1px solid #ccc; overflow-y: scroll; margin-bottom: 10px;"></div>
        <input type="text" id="chat-input" placeholder="输入消息...">
        <button id="send-button">发送</button>
    </div>
    <script src="https://cdn.jsdelivr.net/npm/hls.js@latest"></script>
    <script>
        // 初始化视频流播放
        const video = document.getElementById('live-video');
        const hlsUrl = 'https://demo.unified-streaming.com/k8s/features/stable/video/tears-of-steel/tears-of-steel.ism/.m3u8';

        if (Hls.isSupported()) {
            const hls = new Hls();
            hls.loadSource(hlsUrl);
            hls.attachMedia(video);
            hls.on(Hls.Events.MANIFEST_PARSED, function () {
                video.play();
            });
        } else if (video.canPlayType('application/vnd.apple.mpegurl')) {
            video.src = hlsUrl;
            video.addEventListener('loadedmetadata', function () {
                video.play();
            });
        }

        // 聊天功能
        document.getElementById('send-button').addEventListener('click', function () {
            const message = document.getElementById('chat-input').value;
            if (message.trim() !== '') {
                const chatWindow = document.getElementById('chat-window');
                const newMessage = document.createElement('div');
                newMessage.textContent = message;
                chatWindow.appendChild(newMessage);
                document.getElementById('chat-input').value = '';
            }
        });
    </script>
</body>
</html>
