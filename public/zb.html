<!DOCTYPE html>
<html lang="zh">
<head>
    <script async src="https://pagead2.googlesyndication.com/pagead/js/adsbygoogle.js?client=ca-pub-2813195378092882"
     crossorigin="anonymous"></script>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="google-adsense-account" content="ca-pub-2813195378092882">
    <title>直播页面</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            background: #f0f0f0;
            margin: 0;
            padding: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
        }
        #video-container {
            margin: 20px;
            width: 640px;
            height: 360px;
            background-color: #000;
            position: relative;
        }
        video {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }
        /* ✅ 修复3: 视频错误提示层 */
        #video-error {
            display: none;
            position: absolute;
            inset: 0;
            background: rgba(0,0,0,0.75);
            color: #fff;
            font-size: 15px;
            justify-content: center;
            align-items: center;
            text-align: center;
            padding: 20px;
            box-sizing: border-box;
        }
        #video-error.show {
            display: flex;
        }
        #chat-container {
            width: 640px;
            background: #fff;
            border: 1px solid #ccc;
            border-radius: 6px;
            padding: 12px;
            margin-bottom: 20px;
            box-sizing: border-box;
        }
        #chat-container h2 {
            margin: 0 0 10px;
            font-size: 16px;
            color: #333;
        }
        /* ✅ 修复2: 聊天窗口样式，overflow确保滚动 */
        #chat-window {
            height: 200px;
            border: 1px solid #ddd;
            border-radius: 4px;
            overflow-y: auto;
            margin-bottom: 10px;
            padding: 8px;
            background: #fafafa;
            display: flex;
            flex-direction: column;
            gap: 6px;
        }
        .chat-message {
            font-size: 13px;
            line-height: 1.5;
            word-break: break-all;
        }
        .chat-message .meta {
            color: #888;
            font-size: 11px;
            margin-right: 6px;
        }
        .chat-message .text {
            color: #222;
        }
        .chat-input-row {
            display: flex;
            gap: 8px;
        }
        #chat-input {
            flex: 1;
            padding: 8px 10px;
            border: 1px solid #ccc;
            border-radius: 4px;
            font-size: 14px;
            outline: none;
        }
        #chat-input:focus {
            border-color: #42b983;
        }
        #send-button {
            padding: 8px 16px;
            background: #42b983;
            color: #fff;
            border: none;
            border-radius: 4px;
            cursor: pointer;
            font-size: 14px;
            white-space: nowrap;
        }
        #send-button:hover {
            background: #359268;
        }
        #send-button:disabled {
            background: #a5d6a7;
            cursor: not-allowed;
        }
    </style>
</head>
<body>
    <h1>欢迎来到直播页面</h1>
    <div id="video-container">
        <video id="live-video" controls autoplay muted playsinline></video>
        <!-- ✅ 修复3: 错误提示层 -->
        <div id="video-error">
            ⚠️ 直播信号加载失败，请刷新页面重试
        </div>
    </div>
    <div id="chat-container">
        <h2>💬 聊天</h2>
        <div id="chat-window"></div>
        <div class="chat-input-row">
            <input type="text" id="chat-input" placeholder="输入消息，按 Enter 发送..." maxlength="200">
            <button id="send-button">发送</button>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/hls.js@latest"></script>
    <script>
        // ── 视频播放 ──────────────────────────────────────────
        const video = document.getElementById('live-video');
        const videoError = document.getElementById('video-error');
        const hlsUrl = 'https://demo.unified-streaming.com/k8s/features/stable/video/tears-of-steel/tears-of-steel.ism/.m3u8';

        function showVideoError() {
            videoError.classList.add('show');
        }

        if (Hls.isSupported()) {
            const hls = new Hls();
            hls.loadSource(hlsUrl);
            hls.attachMedia(video);
            hls.on(Hls.Events.MANIFEST_PARSED, function () {
                video.play().catch(() => {});
            });
            // ✅ 修复3: HLS 错误处理
            hls.on(Hls.Events.ERROR, function (event, data) {
                if (data.fatal) {
                    showVideoError();
                }
            });
        } else if (video.canPlayType('application/vnd.apple.mpegurl')) {
            video.src = hlsUrl;
            video.addEventListener('loadedmetadata', function () {
                video.play().catch(() => {});
            });
            // ✅ 修复3: 原生 HLS 错误处理
            video.addEventListener('error', showVideoError);
        } else {
            showVideoError();
        }

        // ── 聊天功能 ──────────────────────────────────────────
        const chatInput = document.getElementById('chat-input');
        const sendButton = document.getElementById('send-button');
        const chatWindow = document.getElementById('chat-window');

        function getTime() {
            const now = new Date();
            const h = String(now.getHours()).padStart(2, '0');
            const m = String(now.getMinutes()).padStart(2, '0');
            const s = String(now.getSeconds()).padStart(2, '0');
            return `${h}:${m}:${s}`;
        }

        function sendMessage() {
            const text = chatInput.value.trim();
            if (!text) return;

            // ✅ 修复4: 带时间戳的消息
            const msgEl = document.createElement('div');
            msgEl.className = 'chat-message';
            msgEl.innerHTML = `<span class="meta">${getTime()} 我</span><span class="text">${escapeHtml(text)}</span>`;
            chatWindow.appendChild(msgEl);

            // ✅ 修复2: 自动滚动到底部
            chatWindow.scrollTop = chatWindow.scrollHeight;

            chatInput.value = '';
            // ✅ 修复5: 发送后保持焦点
            chatInput.focus();
        }

        function escapeHtml(str) {
            return str
                .replace(/&/g, '&amp;')
                .replace(/</g, '&lt;')
                .replace(/>/g, '&gt;')
                .replace(/"/g, '&quot;');
        }

        sendButton.addEventListener('click', sendMessage);

        // ✅ 修复1: 支持回车键发送
        chatInput.addEventListener('keydown', function (e) {
            if (e.key === 'Enter' && !e.shiftKey) {
                e.preventDefault();
                sendMessage();
            }
        });
    </script>
</body>
</html>
